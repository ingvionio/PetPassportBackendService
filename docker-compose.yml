version: '3.8'

services:
  # 1. 🐘 PostgreSQL база данных
  postgres:
    image: postgres:16-alpine
    container_name: petpassport-db
    environment:
      POSTGRES_DB: PetPassportDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # Порт 5433:5432 - для доступа ИЗВНЕ. Внутренний порт всегда 5432.
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - petpassport-network

  # 2. 🖥️ ASP.NET Core приложение (API)
  api:
    build:
      context: .  
      dockerfile: Dockerfile
    container_name: petpassport-api
    environment:
      # Хост базы данных - это имя сервиса: 'postgres'
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=PetPassportDb;Username=postgres;Password=${POSTGRES_PASSWORD}"
      # Адрес бота - это имя сервиса: 'telegram-bot'
      BotService__BaseUrl: "http://telegram-bot:8080" # <-- Исправлено для внутренней связи Docker
      ASPNETCORE_URLS: "http://0.0.0.0:8080"
      CORS_ORIGINS: "${CORS_ORIGINS}"
      ASPNETCORE_ENVIRONMENT: Production
    ports:
      - "8080:8080" # Публикуем API на порт 80 хоста (стандартный HTTP)
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./uploads:/app/wwwroot/uploads
    networks:
      - petpassport-network

  # 3. 🤖 Python Bot (Aiohttp)
  telegram-bot:
    build:
      context: ./PetPassport-TgBot  # <-- Предполагаем, что Python лежит в папке 'bot-project'
      dockerfile: Dockerfile
    container_name: telegram-bot
    restart: unless-stopped
    # Порт 8080:8080 - для доступа ИЗВНЕ (если вы используете webhook).
    # Если бот использует Long Polling, этот порт не нужен.
    ports:
      - "8082:8080" # Меняем порт, чтобы не конфликтовал с API (8080)
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - WEB_HOOK_URL=${WEB_HOOK_URL}
      - WEB_HOOK_PATH=${WEB_HOOK_PATH}
      - WEB_SERVER_HOST=${WEB_SERVER_HOST}
      - HTTP_HOST=0.0.0.0
      - HTTP_PORT=8080
      - BASE_URL=http://api:8080
      - SERVER_URL=http://api:8080

    volumes:
      - ./img:/app/img
    networks:
      - petpassport-network

  # 4. 🌐 Frontend (React + Nginx)
  frontend:
    build:
      context: ../Pet_Passport/front
      dockerfile: Dockerfile
    container_name: petpassport-frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - petpassport-network

volumes:
  postgres_data:

networks:
  petpassport-network:
    driver: bridge